<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- ============================================================================
  _sheet-base.html  —  SHARED ENGINE for warm-ups, worksheets, and recall drills.
  (v0.17, 2026-07-04.) The single scaffold the per-session sheets COPY from, so
  the map · the 📝 remark field · the TTS section · per-card gating · the
  ⬇ Save-for-tutor button are a copy-from-template FACT, not something the
  tutor must remember (principle P4).

  HOW TO MAKE A SESSION SHEET:
    1. Copy this file to lessons/NNN-YYYY-MM-DD/<warmup|worksheet>.html
       (or homework/recall-drills.html).
    2. Edit ONLY the CONFIG block below (title, map, cards, flags). Nothing else.
    3. Set CONFIG.progressive=true for the in-session worksheet (card-by-card,
       enforces P2: each card has "📋 Copy this section → continue" which copies
       THAT card and unlocks the next — so the learner pastes per section and the
       tutor checks per section, never a wall). Leave false for warm-ups/drills.

  CARD/ITEM CONTRACT (see the DEMO CONFIG):
    card  = { tag, title, explain(HTML, optional), tts(bool, optional), items[] }
    item  = { id, prompt(HTML) }                         → text input
            { id, prompt, opts:[...], a:"correct" }       → multiple choice
            { id, audio:"Italian…", who?, prompt/q, ... } → TTS (needs card.tts)
============================================================================= -->
<title>Sheet</title>
<style>
  :root{
    --bg:#f5f3ee; --card:#ffffff; --ink:#26241f; --muted:#8a8478;
    --line:#e6e1d6; --accent:#0f766e; --accent-soft:#d7efec;
    --ear:#2563eb; --g:#0f766e; --v:#b45309; --b:#7c3aed; --ink2:#26241f;
    --good:#0f766e; --bad:#b45309; --lock:#b9b3a6;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink);
    font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; padding:24px 16px 100px;}
  .wrap{max-width:760px; margin:0 auto}
  h1{font-size:22px; margin:0 0 2px}
  .sub{color:var(--muted); font-size:13px; margin-bottom:16px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px 18px; margin-bottom:16px; box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .card.locked{opacity:.5; filter:grayscale(.4)}
  .card.locked .lockmsg{display:block}
  .lockmsg{display:none; color:var(--lock); font-size:13px; font-weight:600}
  .card.locked .body{display:none}
  .card h2{font-size:16px; margin:0 0 9px; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .pill{font-size:11px; font-weight:700; color:#fff; border-radius:999px; padding:2px 9px; letter-spacing:.3px; background:var(--accent)}
  .pill.dark{background:#26241f}
  .explain{font-size:14px; background:#faf8f3; border:1px solid var(--line); border-left:3px solid var(--accent);
    border-radius:8px; padding:11px 13px; margin:0 0 14px}
  .explain b{color:var(--ink)} .explain i{color:#3a372f}
  .explain code, .prompt code{background:#efece4; border-radius:6px; padding:1px 6px; font-size:13px}
  .heard{font-style:italic; color:var(--ear)}
  .maprow{display:flex; gap:10px; padding:7px 0; border-bottom:1px dashed var(--line); font-size:14px}
  .maprow:last-child{border-bottom:0}
  .maprow .ic{flex:0 0 auto; width:22px; text-align:center}
  .maprow .why{color:var(--muted); font-size:12.5px}
  .q{margin-bottom:14px; padding-bottom:12px; border-bottom:1px dashed var(--line)}
  .q:last-child{border-bottom:0; margin-bottom:0; padding-bottom:0}
  .num{font-size:12px; color:var(--muted); font-weight:700; margin-bottom:7px}
  .num .tag{color:#7c3aed}
  .prompt{font-size:14px; margin-bottom:9px}
  .prompt i{color:#3a372f}
  .players{display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:10px}
  .play{border:1px solid var(--line); background:#fdfcf9; color:var(--ink); border-radius:9px; padding:8px 13px; font:inherit; font-weight:600; font-size:14px; cursor:pointer; display:inline-flex; gap:6px; align-items:center;}
  .play:hover{border-color:var(--accent)} .play.primary{background:var(--ear); color:#fff; border-color:var(--ear)}
  .reveal{font-size:12px; color:var(--muted); cursor:pointer; text-decoration:underline; background:none; border:0}
  .transcript{display:none; font-size:14px; color:var(--muted); font-style:italic; margin:0 0 10px}
  .opts label{display:flex; align-items:center; gap:9px; padding:8px 10px; border:1px solid var(--line); border-radius:9px; margin-bottom:7px; cursor:pointer; font-size:14px; background:#fdfcf9;}
  .opts label:has(input:checked){border-color:var(--accent); background:var(--accent-soft); font-weight:600}
  .opts input{accent-color:var(--accent)}
  input[type=text]{width:100%; border:1px solid var(--line); border-radius:9px; padding:9px 11px; font:inherit; color:var(--ink); background:#fdfcf9;}
  input[type=text]:focus{outline:none; border-color:var(--accent)}
  /* v0.18: answer boxes WRAP + auto-grow so a long answer is never cut off (learner request ×2, 2026-07-05) */
  .growbox{width:100%; border:1px solid var(--line); border-radius:9px; padding:9px 11px; font:inherit; line-height:1.5;
    color:var(--ink); background:#fdfcf9; resize:none; overflow:hidden; min-height:42px; display:block; white-space:pre-wrap; word-break:break-word;}
  .growbox:focus{outline:none; border-color:var(--accent)}
  textarea{width:100%; min-height:80px; border:1px solid var(--line); border-radius:9px; padding:10px 11px; font:inherit; color:var(--ink); background:#fffdf6; resize:vertical;}
  textarea:focus{outline:none; border-color:var(--accent)}
  .remark{background:#fffdf6; border-color:#efe7cf}
  .contbtn{border:0; border-radius:10px; padding:10px 16px; font:inherit; font-weight:700; cursor:pointer; background:var(--accent); color:#fff; margin-top:6px}
  .contbtn.done{background:#dceae7; color:var(--accent)}
  .cardmsg{font-size:12px; color:var(--good); margin-left:10px}
  .bar{position:fixed; left:0; right:0; bottom:0; background:#ffffffcc; backdrop-filter:blur(6px); border-top:1px solid var(--line); padding:12px 16px; display:flex; gap:10px; align-items:center; justify-content:center;}
  .prog{font-size:12px; color:var(--muted); margin-right:auto}
  button.act{border:0; border-radius:10px; padding:11px 18px; font:inherit; font-weight:600; cursor:pointer; background:var(--accent); color:#fff;}
  button.ghost{background:#efece4; color:var(--ink); border:1px solid var(--line)}
  .saved{font-size:12px; color:var(--muted)}
  #out{white-space:pre-wrap; background:#1f1d19; color:#e9e4d8; border-radius:12px; padding:14px; font:13px/1.5 ui-monospace,Menlo,monospace; margin:14px 0 0; display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1 id="h-title"></h1>
  <div class="sub" id="h-sub"></div>
  <div id="map"></div>
  <div id="cards"></div>
  <div class="card remark" id="remarkcard">
    <h2><span class="pill dark">📝</span> Note to tutor</h2>
    <p class="sub" style="margin:0 0 9px">Too hard / too easy? A word still fuzzy? How this sheet felt? Comes back with your answers.</p>
    <textarea id="remark" placeholder="optional — English or Italian…"></textarea>
  </div>
  <pre id="out"></pre>
</div>

<div class="bar">
  <span class="prog" id="prog"></span>
  <button class="act" onclick="saveForTutor()">⬇ Save for tutor</button>
  <button class="act ghost" onclick="copyAll()">📋 Copy ALL</button>
  <button class="act ghost" onclick="clearAll()">Clear</button>
  <span class="saved" id="saved"></span>
</div>

<script>
/* ============================== CONFIG (edit this only) ============================== */
const CONFIG = {
  title: "Recall drills 🎯 — L014 (2026-07-19)",
  subtitle: "4 items — review only, everything here was graded live today. Anki day, so kept short.",
  storageKey: "l014-recall-v1",
  pasteHeading: "My answers — Recall drills L014 (2026-07-19):",
  progressive: false,
  remark: true,
  cards: [
    { tag:"📐 grammar · G-009", title:"avere — one more trigger word",
      items:[
        { id:"r1", prompt:'Se (lui) ___ (avere) più tempo, viaggerebbe di più. <i>("If he had more time, he\'d travel more" — which trigger, which stem?)</i>' },
      ] },
    { tag:"📐 grammar · G-017", title:"dovere — the noi-person",
      items:[
        { id:"r2", prompt:'Quest\'estate (noi) ___ (dovere) risparmiare di più. <i>("This summer we\'ll have to save more")</i>' },
      ] },
    { tag:"👂 ear · S-001", title:"non vedere l'ora — one more, no clitic this time", tts:true,
      items:[
        { id:"r3", audio:"Non vedo l'ora delle vacanze!", q:'Translate the meaning:' },
      ] },
    { tag:"B · comeback", title:"Handle the comeback",
      items:[
        { id:"r4", prompt:'The teacher asks: <i>"Cosa farete durante l\'estate?"</i> — type the reply you\'d actually give.' },
      ] },
  ],
};
/* ==================================================================================== */

// v0.17: tier-2 save endpoint (the tools/drive-save-endpoint.gs web-app URL) so
// ⬇ Save for tutor also works from the published iPhone copy, away from the Mac.
// Set ONCE by the tutor; '' = tier skipped. Copies inherit it — not a CONFIG field.
const TUTOR_SAVE_URL = 'https://script.google.com/macros/s/AKfycby88gFnMprMuBLTwUdZmPSdSM7o-BweDZvtf95_YaB6fvderXbhh0uLXKSbagsbNDHbXw/exec';

const $ = id => document.getElementById(id);
const KEY = CONFIG.storageKey;
const CARDS = CONFIG.cards || [];
function allItems(){ return CARDS.flatMap(c=>c.items); }
function pillClass(tag){ const t=(tag||'').toLowerCase();
  if(/ear|s-/.test(t)) return 'background:var(--ear)';
  if(/^a |tts|capisci/.test(t)) return 'background:var(--ear)';
  if(/^b |comeback|rispondi/.test(t)) return 'background:var(--b)';
  if(/^v|vocab/.test(t)) return 'background:var(--v)';
  return 'background:var(--accent)'; }

/* ---- TTS engine (Web Speech, it-IT) ---- */
let itVoice=null;
function loadVoices(){ const vs=window.speechSynthesis?speechSynthesis.getVoices():[]; itVoice=vs.find(v=>/^it/i.test(v.lang))||null; }
if(window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function speak(text,rate){ if(!window.speechSynthesis) return false; speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang='it-IT'; u.rate=rate; if(itVoice)u.voice=itVoice; speechSynthesis.speak(u); return true; }

function render(){
  $('h-title').textContent = CONFIG.title || 'Sheet';
  $('h-sub').textContent = CONFIG.subtitle || '';
  // map
  if(CONFIG.map && CONFIG.map.length){
    let m='<div class="card"><h2><span class="pill dark">🗺️</span> Today’s map</h2>';
    CONFIG.map.forEach(r=> m+='<div class="maprow"><span class="ic">'+(r.ic||'•')+'</span><span><b>'+r.area+'</b> — '+(r.what||'')+(r.why?' <span class="why">· '+r.why+'</span>':'')+'</span></div>');
    m+='</div>'; $('map').innerHTML=m;
  }
  // cards
  const root=$('cards');
  CARDS.forEach((card,ci)=>{
    const el=document.createElement('div'); el.className='card'; el.id='card-'+ci;
    if(CONFIG.progressive && ci>0) el.classList.add('locked');
    let h='<h2><span class="pill" style="'+pillClass(card.tag)+'">'+(card.tag||('Card '+(ci+1)))+'</span>'+(card.title||'')+'<span class="lockmsg">🔒 finish the previous section first</span></h2>';
    h+='<div class="body">';
    if(card.explain) h+='<div class="explain">'+card.explain+'</div>';
    card.items.forEach((it,i)=>{
      h+='<div class="q"><div class="num">'+(ci+1)+String.fromCharCode(97+i)+(it.who?' · <span class="tag">'+it.who+'</span>':'')+'</div>';
      if(it.audio){
        h+='<div class="players">'
          +'<button type="button" class="play primary" data-play="'+it.id+'" data-rate="0.6">▶ Lento</button>'
          +'<button type="button" class="play" data-play="'+it.id+'" data-rate="1.0">▶ Normale</button>'
          +'<button type="button" class="reveal" data-reveal="'+it.id+'">show text</button></div>';
        h+='<div class="transcript" id="t-'+it.id+'">«'+it.audio+'»</div>';
      }
      h+='<div class="prompt">'+(it.prompt||it.q||'')+'</div>';
      if(it.opts){ h+='<div class="opts">'; it.opts.forEach(o=>{ const v=o.replace(/"/g,'&quot;'); h+='<label><input type="radio" name="'+it.id+'" value="'+v+'"> <span>'+o+'</span></label>'; }); h+='</div>'; }
      else h+='<textarea class="growbox" rows="1" id="'+it.id+'" placeholder="'+(it.audio?'la tua risposta…':'your answer…')+'" autocomplete="off"></textarea>';
      h+='</div>';
    });
    if(CONFIG.progressive){
      const last = ci===CARDS.length-1;
      h+='<button class="contbtn" data-cont="'+ci+'">📋 Copy this section'+(last?'':' → continue')+'</button><span class="cardmsg" id="cm-'+ci+'"></span>';
    }
    h+='</div>';
    el.innerHTML=h; root.appendChild(el);
  });
  document.querySelectorAll('input,textarea').forEach(el=> el.addEventListener('input', ()=>{ if(el.classList.contains('growbox')) autoGrow(el); save(); updateProg(); }));
  document.querySelectorAll('input[type=radio]').forEach(el=> el.addEventListener('change', ()=>{ save(); updateProg(); }));
  if(!CONFIG.remark) $('remarkcard').style.display='none';
}

document.addEventListener('click', function(e){
  const pb=e.target.closest('[data-play]');
  if(pb){ const it=allItems().find(x=>x.id===pb.getAttribute('data-play')); if(!speak(it.audio,parseFloat(pb.getAttribute('data-rate')))){ const t=$('t-'+it.id); if(t)t.style.display='block'; } return; }
  const rv=e.target.closest('[data-reveal]');
  if(rv){ const t=$('t-'+rv.getAttribute('data-reveal')); if(t) t.style.display=(t.style.display==='block'?'none':'block'); return; }
  const cont=e.target.closest('[data-cont]');
  if(cont){ const ci=+cont.getAttribute('data-cont'); copyCard(ci); cont.classList.add('done');
    const next=$('card-'+(ci+1)); if(next){ next.classList.remove('locked'); next.scrollIntoView({behavior:'smooth',block:'start'}); } return; }
});

function autoGrow(el){ el.style.height='auto'; el.style.height=(el.scrollHeight)+'px'; }
function getAns(it){ if(it.opts){ const el=document.querySelector('input[name="'+it.id+'"]:checked'); return el?el.value:''; } const el=$(it.id); return el?el.value.trim():''; }
function updateProg(){ const t=allItems().length, d=allItems().filter(getAns).length; $('prog').textContent=d+' / '+t+' answered'; }
function save(){ const data={remark:($('remark')||{}).value||''}; allItems().forEach(it=> data[it.id]=getAns(it));
  localStorage.setItem(KEY, JSON.stringify(data)); const s=$('saved'); s.textContent='✓ saved'; clearTimeout(window._st); window._st=setTimeout(()=> s.textContent='',1200); }
function load(){ const raw=localStorage.getItem(KEY); if(!raw) return; const d=JSON.parse(raw);
  allItems().forEach(it=>{ if(d[it.id]==null) return; if(it.opts){ document.querySelectorAll('input[name="'+it.id+'"]').forEach(r=>{ if(r.value===d[it.id]) r.checked=true; }); } else { const el=$(it.id); if(el) el.value=d[it.id]; } });
  if(d.remark!=null){ const r=$('remark'); if(r) r.value=d.remark; } }
function stripHtml(h){ const t=document.createElement('div'); t.innerHTML=h; return t.textContent.replace(/\s+/g,' ').trim(); }

function cardText(ci){
  const card=CARDS[ci]; let s='['+(card.tag||('Card '+(ci+1)))+'] '+(card.title||'')+'\n';
  card.items.forEach((it,i)=>{ const lbl=(ci+1)+String.fromCharCode(97+i);
    if(it.audio) s+='  '+lbl+'. (heard: «'+it.audio+'»)'+(it.q&&it.opts?' Q: '+it.q:'')+'\n';
    else s+='  '+lbl+'. '+stripHtml(it.prompt||it.q||'')+'\n';
    s+='      → '+(getAns(it)||'(blank)')+'\n'; });
  return s;
}
function clip(text,msg,el){ navigator.clipboard.writeText(text).then(()=>{ if(el) el.textContent=msg; },()=>{ if(el) el.textContent='(copy failed — select the box)'; }); }
function copyCard(ci){ let s=(CONFIG.pasteHeading||'My answers:')+'\n\n'+cardText(ci);
  // v0.16.1: the 📝 note must ride back with a per-card copy too — include it when the learner has
  // written one, and always on the LAST card (its natural place). Was only in copyAll → notes got stranded.
  const note=(($('remark')||{}).value||'').trim();
  if(note || ci===CARDS.length-1) s+='\n[📝 Note to tutor]\n  '+(note||'(none)')+'\n';
  clip(s,'✓ copied — paste this section to me',$('cm-'+ci)); }
function buildHandoff(){
  let s=(CONFIG.pasteHeading||'My answers:')+'\n'; CARDS.forEach((c,ci)=> s+='\n'+cardText(ci));
  s+='\n[📝 Note to tutor]\n  '+(($('remark')||{}).value||'(none)')+'\n';
  return s;
}
function copyAll(){
  const s=buildHandoff();
  $('out').textContent=s; $('out').style.display='block';
  clip(s,'✓ copied — paste it back to me',$('saved')); $('out').scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ---- ⬇ Save for tutor (v0.17) — three-tier, works at home AND from the published
   iPhone copy: local /save (dictation-server) → Drive endpoint (TUTOR_SAVE_URL)
   → plain download. Same contract as the dictation sheet's saveHandoff. ---- */
function stamp(){ const d=new Date(), p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes()); }
function sheetKind(){ return ((decodeURIComponent(location.pathname).split('/').pop()||'').replace(/\.html?$/,''))||'sheet'; }
function sessionRelPath(name){                       // /lessons/NNN-date/… (local) or /hw/NNN-date/… (published)
  const m = decodeURIComponent(location.pathname).match(/\/(?:lessons|hw)\/(\d{3}-\d{4}-\d{2}-\d{2})\//);
  return m ? 'lessons/'+m[1]+'/homework/'+name : null;
}
function saveFile(text,name){ const blob=new Blob([text],{type:'text/markdown;charset=utf-8'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(url),1500); }
function barMsg(t){ const s=$('saved'); s.textContent=t; clearTimeout(window._bm); window._bm=setTimeout(()=> s.textContent='',6000); }
function saveForTutor(){
  const body=buildHandoff(); $('out').textContent=body; $('out').style.display='block';
  const name=sheetKind()+'_'+stamp()+'.md';
  const text='<!-- saved '+stamp()+' · sheet '+sheetKind()+' -->\n\n'+body;
  const rel=sessionRelPath(name);
  const download=()=>{ saveFile(text,name); barMsg('✓ saved '+name+' to Downloads — tell your tutor “done”'); };
  if(!rel){ download(); return; }
  const tierCloud=()=>{
    if(!TUTOR_SAVE_URL){ download(); return; }
    // no custom headers → a CORS "simple request" (the standard Apps Script pattern)
    fetch(TUTOR_SAVE_URL,{method:'POST', body:JSON.stringify({path:rel, content:text})})
      .then(r=>r.json())
      .then(j=>{ if(j&&j.ok){ barMsg('✓ saved home into '+j.path+' — tell your tutor “done”'); } else { throw new Error((j&&j.error)||'save failed'); } })
      .catch(download);
  };
  fetch('/save',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({path:rel, content:text})})
    .then(r=>r.json())
    .then(j=>{ if(j&&j.ok){ barMsg('✓ saved into '+j.path+' — tell your tutor “done”'); } else { throw new Error((j&&j.error)||'save failed'); } })
    .catch(tierCloud);
}
function clearAll(){ if(!confirm('Clear all your answers?')) return; localStorage.removeItem(KEY);
  allItems().forEach(it=>{ if(it.opts){ document.querySelectorAll('input[name="'+it.id+'"]').forEach(r=>r.checked=false); } else { const el=$(it.id); if(el) el.value=''; } });
  const r=$('remark'); if(r) r.value=''; $('out').style.display='none'; updateProg(); }

render(); load(); document.querySelectorAll('.growbox').forEach(autoGrow); updateProg();
</script>
<div style="color:#c4bfb2;font-size:11px;text-align:center;padding:8px 0">build 2026-07-19-1642</div></body>
</html>
